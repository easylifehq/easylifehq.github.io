<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EasyLife | Hub</title>
  <link rel="stylesheet" href="css/index.css" />
</head>
<body>
  <header class="app-header">
    <div class="app-header-left">
      <a href="hub.html" class="app-brand">EasyLife</a>
    </div>

    <div class="app-header-right">
      <button id="logoutBtn" class="logout-btn" type="button">Log Out</button>
    </div>
  </header>

  <main class="dashboard-page">
    <section class="hero">
      <div>
        <p class="eyebrow">Home Base</p>
        <h1>Welcome to EasyLife</h1>
        <p class="hero-subtext">
          Pick your workspace and keep moving.
        </p>
      </div>
    </section>

    <section class="stats-grid">
      <a class="stat-card" href="http://easylist.easylifehq.com/dashboard.html">
        <p class="stat-label">EasyList</p>
        <h2>Tasks</h2>
      </a>

      <a class="stat-card" href="http://easypipeline.easylifehq.com/dashboard.html">
        <p class="stat-label">EasyPipeline</p>
        <h2>Applications</h2>
      </a>
    </section>
  </main>

  <script type="module" src="js/guard.js"></script>
  <script type="module">
    import { auth } from "./js/firebase-config.js";
    import { signOut } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

    const logoutBtn = document.getElementById("logoutBtn");

    logoutBtn?.addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
