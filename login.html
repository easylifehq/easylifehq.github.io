<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EasyLife | Log In</title>
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <main class="auth-page">
    
    <section class="auth-layout">
      
      </div>
      

      <section class="auth-panel auth-card">
        <a href="index.html" class="back-link">← Back to home</a>

        <div class="auth-header">
          <h2>Log in or create your account</h2>
          <p class="eyebrow">EasyLife Account</p>
        </div>

        <div class="auth-tabs">
          <button class="tab-btn active" id="showLoginBtn" type="button">Log In</button>
          <button class="tab-btn" id="showSignupBtn" type="button">Sign Up</button>
        </div>

        <p id="authMessage" class="auth-message"></p>

        <form id="authForm" class="auth-form">
          <div class="form-group" id="nameGroup" style="display: none;">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Your name" />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com" required />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" required />
          </div>

          <button id="submitBtn" class="primary-btn" type="submit">Log In</button>
        </form>

        <div class="auth-actions">
          <button id="forgotPasswordBtn" class="text-btn" type="button">
            Forgot password?
          </button>
        </div>
      </section>
    </section>
  </main>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
